# Static file server for the built admin panel.
# NOTE: no /api proxying here on purpose — Caddy handles /api routing in production.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path serves index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
