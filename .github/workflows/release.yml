# Release workflow for zed-downloader.
# Fires when a semver tag (v*.*.*) is pushed. Enforces version discipline by
# asserting the tag matches the repo VERSION file, then publishes a GitHub
# Release with auto-generated notes. This is a compose app, so there are no
# build artifacts: the release is a version marker for the update/rollback flow.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert tag matches VERSION
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "VERSION file: $VERSION"
          echo "Tag (without 'v'): $TAG"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag '$TAG' does not match VERSION file '$VERSION'. Update VERSION before tagging."
            exit 1
          fi
          echo "Tag matches VERSION."
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
